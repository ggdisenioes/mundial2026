name: Sync resultados football-data.org

on:
  schedule:
    # Mundial 2026 — partidos entre 16:00 y 03:00 UTC (Norteamérica)
    # Primera ronda: 16:00 UTC (mediodía EDT) · Última ronda: ~01:00 UTC (9pm PDT)
    # Margen 1h extra al inicio y al final para cubrir variaciones de horario
    - cron: "*/20 15-23 * * *"   # 15:00 → 23:40 UTC
    - cron: "*/20 0-4 * * *"     # 00:00 → 04:40 UTC
  workflow_dispatch:              # disparo manual desde GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping sync endpoint
        # Best-effort: dispara el sync y NUNCA falla el job (para no enviar
        # emails de error). El resultado real del sync queda registrado en la
        # app (settings.sync_meta) y es visible en el panel admin.
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            --connect-timeout 15 --max-time 60 \
            "${{ secrets.APP_URL }}/api/sync/auto" || echo 000)
          echo "HTTP status: $STATUS"
          echo "Sync ping enviado (este job nunca falla a propósito)."

name: Sync resultados football-data.org

on:
  schedule:
    # Mundial 2026 — partidos entre 16:00 y 03:00 UTC (Norteamérica)
    # Primera ronda: 16:00 UTC (mediodía EDT) · Última ronda: ~01:00 UTC (9pm PDT)
    # Margen 1h extra al inicio y al final para cubrir variaciones de horario
    - cron: "*/20 15-23 * * *"   # 15:00 → 23:40 UTC
    - cron: "*/20 0-4 * * *"     # 00:00 → 04:40 UTC
  workflow_dispatch:              # disparo manual desde GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync con football-data.org
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -L \
            "${{ secrets.APP_URL }}/api/sync/auto")
          echo "HTTP status: $response"
          if [ "$response" -ge 500 ]; then
            echo "Sync falló con status $response"
            exit 1
          fi
          echo "Sync OK (status $response)"

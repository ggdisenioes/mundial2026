name: Auto-sync resultados

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping sync endpoint
        # Best-effort: dispara el sync y NUNCA falla el job (para no enviar
        # emails de error). El resultado real del sync queda registrado en la
        # app (settings.sync_meta) y es visible en el panel admin.
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            --connect-timeout 15 --max-time 60 \
            "${{ secrets.SITE_URL }}/api/sync/auto" || echo 000)
          echo "HTTP status: $STATUS"
          echo "Sync ping enviado (este job nunca falla a propósito)."
